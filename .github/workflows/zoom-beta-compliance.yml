name: Zoom Beta Compliance Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  tls-evidence:
    name: TLS 1.2+ Evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PROD_HOST: ${{ vars.ZOOM_EVIDENCE_PROD_HOST }}
      STAGE_HOST: ${{ vars.ZOOM_EVIDENCE_STAGE_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Set default hosts
        run: |
          echo "PROD_HOST=${PROD_HOST:-www.meetli.cc}" >> "$GITHUB_ENV"
          echo "STAGE_HOST=${STAGE_HOST:-dev.meetli.cc}" >> "$GITHUB_ENV"

      - name: Run TLS checks
        run: bash scripts/compliance/tls_evidence.sh "$PROD_HOST" "$STAGE_HOST"

      - name: Upload TLS evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tls-evidence
          path: |
            docs/compliance/zoom-beta/evidence/tls-check-latest.txt
            docs/compliance/zoom-beta/evidence/tls-summary-latest.md
          retention-days: 90

  dast-evidence:
    name: DAST Baseline Evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DAST_TARGET: ${{ vars.ZOOM_EVIDENCE_DAST_TARGET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set default DAST target
        run: |
          echo "DAST_TARGET=${DAST_TARGET:-https://dev.meetli.cc}" >> "$GITHUB_ENV"

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: ${{ env.DAST_TARGET }}
          cmd_options: "-a -m 5"
          allow_issue_writing: false
          fail_action: false

      - name: Upload DAST evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-evidence
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 90

  sast-evidence:
    name: SAST Evidence - npm audit and Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > npm-audit-latest.json

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep
        continue-on-error: true
        run: semgrep scan --config auto --json > semgrep-latest.json

      - name: Upload SAST evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-evidence
          path: |
            npm-audit-latest.json
            semgrep-latest.json
          retention-days: 90

  commit-evidence:
    name: Commit Evidence Files
    runs-on: ubuntu-latest
    needs:
      - tls-evidence
      - dast-evidence
      - sast-evidence
    if: always()
    permissions:
      contents: write
    env:
      PROD_HOST: ${{ vars.ZOOM_EVIDENCE_PROD_HOST }}
      STAGE_HOST: ${{ vars.ZOOM_EVIDENCE_STAGE_HOST }}
      DAST_TARGET: ${{ vars.ZOOM_EVIDENCE_DAST_TARGET }}

    steps:
      - uses: actions/checkout@v4

      - name: Download evidence artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Copy raw evidence into repository
        run: |
          mkdir -p docs/compliance/zoom-beta/evidence

          if [ -d downloaded-artifacts/tls-evidence ]; then
            cp downloaded-artifacts/tls-evidence/tls-check-latest.txt docs/compliance/zoom-beta/evidence/ || true
            cp downloaded-artifacts/tls-evidence/tls-summary-latest.md docs/compliance/zoom-beta/evidence/ || true
          fi

          if [ -d downloaded-artifacts/dast-evidence ]; then
            cp downloaded-artifacts/dast-evidence/report_html.html docs/compliance/zoom-beta/evidence/zap-report.html || true
            cp downloaded-artifacts/dast-evidence/report_md.md docs/compliance/zoom-beta/evidence/zap-report.md || true
            cp downloaded-artifacts/dast-evidence/report_json.json docs/compliance/zoom-beta/evidence/zap-report.json || true
          fi

          if [ -d downloaded-artifacts/sast-evidence ]; then
            cp downloaded-artifacts/sast-evidence/npm-audit-latest.json docs/compliance/zoom-beta/evidence/ || true
            cp downloaded-artifacts/sast-evidence/semgrep-latest.json docs/compliance/zoom-beta/evidence/ || true
          fi

      - name: Update evidence summaries
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATE_UTC="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          cat > docs/compliance/zoom-beta/sast-latest.md <<EOF
          # SAST Latest Evidence

          Last run: ${DATE_UTC}

          GitHub Actions run:
          ${RUN_URL}

          Tools:
          - npm audit
          - Semgrep

          Evidence files:
          - docs/compliance/zoom-beta/evidence/npm-audit-latest.json
          - docs/compliance/zoom-beta/evidence/semgrep-latest.json

          Status:
          - SAST evidence is generated automatically by GitHub Actions.
          - Critical/High findings must be remediated or documented with accepted risk.
          EOF

          cat > docs/compliance/zoom-beta/dast-latest.md <<EOF
          # DAST Latest Evidence

          Last run: ${DATE_UTC}

          GitHub Actions run:
          ${RUN_URL}

          Tool:
          - OWASP ZAP Baseline Scan

          Target:
          - ${DAST_TARGET:-https://dev.meetli.cc}

          Evidence files:
          - docs/compliance/zoom-beta/evidence/zap-report.html
          - docs/compliance/zoom-beta/evidence/zap-report.md
          - docs/compliance/zoom-beta/evidence/zap-report.json

          Status:
          - DAST evidence is generated automatically by GitHub Actions.
          - Review ZAP report for current alerts.
          - Critical/High findings must be remediated before Zoom resubmission.
          EOF

          cat > docs/compliance/zoom-beta/tls-1.2-evidence.md <<EOF
          # TLS 1.2+ Evidence

          Last run: ${DATE_UTC}

          GitHub Actions run:
          ${RUN_URL}

          Hosts checked:
          - ${PROD_HOST:-www.meetli.cc}
          - ${STAGE_HOST:-dev.meetli.cc}

          Evidence files:
          - docs/compliance/zoom-beta/evidence/tls-check-latest.txt
          - docs/compliance/zoom-beta/evidence/tls-summary-latest.md

          Status:
          - TLS 1.2+ support is verified automatically by GitHub Actions.
          EOF

      - name: Commit evidence files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/compliance/zoom-beta/sast-latest.md
          git add docs/compliance/zoom-beta/dast-latest.md
          git add docs/compliance/zoom-beta/tls-1.2-evidence.md
          git add docs/compliance/zoom-beta/evidence/

          if git diff --cached --quiet; then
            echo "No evidence changes to commit."
          else
            git commit -m "Update Zoom Beta compliance evidence"
            git push
          fi
